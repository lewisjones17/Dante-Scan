<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DanteSnap!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
  :root{
    --bg:#0e1117; --card:#171b24; --accent:#3ddc97; --accent2:#2bb6e8;
    --text:#eef1f6; --muted:#8a93a6; --danger:#ff6b6b; --warn:#ffcc66;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .app{width:100%; max-width:480px;}
  h1{
    text-align:center; font-size:28px; margin:0 0 4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{text-align:center; color:var(--muted); font-size:13px; margin-bottom:20px;}
  .card{
    background:var(--card); border-radius:18px; padding:20px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);
  }
  .screen{display:none;}
  .screen.active{display:block;}
  .hint{text-align:center; color:var(--muted); font-size:13px; margin-bottom:16px;}

  .pillrow{display:flex; gap:8px; justify-content:center; margin-bottom:6px;}
  .pill{
    flex:1; padding:10px 0; border-radius:999px; border:2px solid #2a2f3d;
    background:transparent; color:var(--muted); font-weight:600; font-size:14px;
  }
  .pill.active{border-color:var(--accent); color:var(--accent); background:rgba(61,220,151,.08);}

  button{font-family:inherit; cursor:pointer;}
  .btn{
    display:block; width:100%; padding:14px; border:none; border-radius:14px;
    font-size:16px; font-weight:700; margin-top:10px; transition:transform .1s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#06140f;}
  .btn-secondary{background:#232838; color:var(--text);}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  .btn[disabled]{opacity:.5;}

  .video-wrap{
    position:relative; border-radius:14px; overflow:hidden; background:#000;
    aspect-ratio:3/4;
  }
  video{width:100%; height:100%; object-fit:cover; display:block;}
  .analyzing{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.55); color:#fff; font-weight:600; font-size:15px; text-align:center;
  }

  label{display:block; font-size:13px; color:var(--muted); margin:14px 0 6px;}
  input[type=text]{
    width:100%; padding:14px; border-radius:12px; border:1px solid #2a2f3d;
    background:#0e1117; color:var(--text); font-size:16px;
  }

  .photo-preview{width:100%; border-radius:14px; display:block;}
  .row{display:flex; gap:10px;}
  .row .btn{flex:1;}

  #toast{
    position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-20px);
    background:var(--accent); color:#06140f; padding:12px 20px; border-radius:12px;
    font-weight:700; opacity:0; transition:all .3s; z-index:50; display:flex; align-items:center; gap:8px;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .check{
    width:18px; height:18px; border-radius:50%; background:#06140f; position:relative; flex-shrink:0;
  }
  .check::after{
    content:''; position:absolute; left:5px; top:3px; width:5px; height:9px;
    border:2px solid var(--accent); border-top:none; border-left:none; transform:rotate(45deg);
  }
</style>
</head>
<body>

<div id="toast"><span class="check"></span><span id="toastText">Sent!</span></div>

<div class="app">
  <h1>DanteSnap!</h1>
  <div class="subtitle">Dante device scanner — Audinate / Neutrik / Glensound</div>

  <div class="card">

    <!-- SCREEN 1: start -->
    <div class="screen active" id="screen-start">
      <div class="hint">Point the camera at the device label, then capture.</div>
      <button class="btn btn-primary" id="btnStartCamera">Start Camera</button>
    </div>

    <!-- SCREEN 2: capture -->
    <div class="screen" id="screen-capture">
      <div class="video-wrap">
        <video id="video" playsinline muted autoplay></video>
        <div class="analyzing" id="analyzingOverlay" style="display:none;">Analyzing photo…</div>
      </div>
      <div class="row" id="captureButtons">
        <button class="btn btn-secondary" id="btnCancelCapture">Cancel</button>
        <button class="btn btn-primary" id="btnCapture">Capture</button>
      </div>
    </div>

    <!-- SCREEN 3: review + send -->
    <div class="screen" id="screen-review">
      <img id="reviewPhoto" class="photo-preview">

      <label>Device ID (edit if needed)</label>
      <input type="text" id="deviceIdInput" placeholder="Scanned ID will appear here">

      <label>Device Type</label>
      <div class="pillrow">
        <button class="pill devicetype-pill" data-devicetype="Audinate AVIO">AVIO</button>
        <button class="pill devicetype-pill" data-devicetype="Neutrik">Neutrik</button>
        <button class="pill devicetype-pill" data-devicetype="Glensound">Glensound</button>
      </div>

      <label>Location</label>
      <input type="text" id="locationInput" placeholder="e.g. Commentary Booth 3">

      <div class="row">
        <button class="btn btn-secondary" id="btnRetake">Retake</button>
        <button class="btn btn-primary" id="btnSend">Send</button>
      </div>
    </div>

  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
// ===== CONFIG =====
const APPS_SCRIPT_URL = 'PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE'; // .../exec

// ===== STATE =====
let stream = null;
let deviceId = '';
let deviceType = '';
let deviceLocation = '';
let scanType = 'manual'; // qr | ocr | manual
let photoDataUrl = '';

// ===== ELEMENTS =====
const screens = {
  start: document.getElementById('screen-start'),
  capture: document.getElementById('screen-capture'),
  review: document.getElementById('screen-review'),
};
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const analyzingOverlay = document.getElementById('analyzingOverlay');
const captureButtons = document.getElementById('captureButtons');

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

function showToast(text, isError){
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = text;
  toast.style.background = isError ? 'var(--danger)' : 'var(--accent)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== CAMERA =====
async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
  });
  video.srcObject = stream;
  await video.play();
}

function stopCamera(){
  if (stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

document.getElementById('btnStartCamera').addEventListener('click', async () => {
  try{
    await startCamera();
    analyzingOverlay.style.display = 'none';
    captureButtons.style.display = 'flex';
    showScreen('capture');
  }catch(err){
    showToast('Camera error: ' + err.message, true);
  }
});

document.getElementById('btnCancelCapture').addEventListener('click', () => {
  stopCamera();
  showScreen('start');
});

// ===== CAPTURE (single shot — this photo is analyzed AND uploaded) =====
document.getElementById('btnCapture').addEventListener('click', async () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  photoDataUrl = canvas.toDataURL('image/jpeg', 0.85);

  stopCamera();
  captureButtons.style.display = 'none';
  analyzingOverlay.style.display = 'flex';

  await analyzeCapture();

  document.getElementById('reviewPhoto').src = photoDataUrl;
  document.getElementById('deviceIdInput').value = deviceId;
  selectDeviceTypePill(deviceType);

  const locationInput = document.getElementById('locationInput');
  if (!locationInput.value){
    locationInput.value = localStorage.getItem('dantesnap_last_location') || '';
  }

  showScreen('review');
});

// ===== ANALYZE: try QR on full frame, fall back to OCR on a center crop =====
async function analyzeCapture(){
  deviceId = '';
  deviceType = '';
  scanType = 'manual';

  // 1. QR — scan the full captured frame (QR can be anywhere in shot, e.g. AVIO label)
  const fullImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(fullImageData.data, fullImageData.width, fullImageData.height);
  if (code && code.data){
    deviceId = code.data;
    deviceType = 'Audinate AVIO';
    scanType = 'qr';
    return;
  }

  // 2. No QR — OCR fallback on a center-weighted crop.
  // NOTE: crop box is a starting guess, not yet tuned to real Neutrik/Glensound
  // label photos — same as before, recalibrate once we have those.
  const cropX = canvas.width * 0.08;
  const cropY = canvas.height * 0.38;
  const cropW = canvas.width * 0.84;
  const cropH = canvas.height * 0.24;

  const cropCanvas = document.createElement('canvas');
  const scale = 2;
  cropCanvas.width = cropW * scale;
  cropCanvas.height = cropH * scale;
  const cropCtx = cropCanvas.getContext('2d');
  cropCtx.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropCanvas.width, cropCanvas.height);

  const imgData = cropCtx.getImageData(0, 0, cropCanvas.width, cropCanvas.height);
  const d = imgData.data;
  let min = 255, max = 0;
  for (let i = 0; i < d.length; i += 4){
    const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = gray;
    if (gray < min) min = gray;
    if (gray > max) max = gray;
  }
  const range = Math.max(max - min, 1);
  for (let i = 0; i < d.length; i += 4){
    const stretched = ((d[i] - min) / range) * 255;
    d[i] = d[i+1] = d[i+2] = stretched;
  }
  cropCtx.putImageData(imgData, 0, 0);

  try{
    const result = await Tesseract.recognize(cropCanvas.toDataURL('image/png'), 'eng');
    const text = result.data.text.replace(/\s+/g, ' ').trim();
    if (text){
      deviceId = text;
      scanType = 'ocr';
    }
  }catch(err){
    // leave deviceId blank for manual entry
  }
}

// ===== DEVICE TYPE PILLS (AVIO / Neutrik / Glensound — always manually selectable) =====
function selectDeviceTypePill(type){
  document.querySelectorAll('.devicetype-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.devicetype === type);
  });
}
document.querySelectorAll('.devicetype-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    deviceType = pill.dataset.devicetype;
    selectDeviceTypePill(deviceType);
  });
});

// ===== RETAKE =====
document.getElementById('btnRetake').addEventListener('click', async () => {
  try{
    await startCamera();
    analyzingOverlay.style.display = 'none';
    captureButtons.style.display = 'flex';
    showScreen('capture');
  }catch(err){
    showToast('Camera error: ' + err.message, true);
  }
});

// ===== SEND (same captured photo — no separate upload photo) =====
document.getElementById('btnSend').addEventListener('click', async () => {
  deviceId = document.getElementById('deviceIdInput').value.trim();
  if (!deviceId){
    showToast('Enter a device ID first', true);
    return;
  }
  if (!deviceType){
    showToast('Select a device type', true);
    return;
  }
  deviceLocation = document.getElementById('locationInput').value.trim();
  if (!deviceLocation){
    showToast('Enter a location', true);
    return;
  }
  if (APPS_SCRIPT_URL.includes('PASTE_YOUR')){
    showToast('Set APPS_SCRIPT_URL in the file first', true);
    return;
  }

  localStorage.setItem('dantesnap_last_location', deviceLocation);

  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const base64 = photoDataUrl.split(',')[1];

  try{
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Apps Script web apps don't return CORS headers; fire-and-forget
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        location: deviceLocation,
        deviceType: deviceType,
        macAddress: deviceId,
        photo: base64,
        photoMimeType: 'image/jpeg'
      })
    });
    showToast('Sent!');
    resetAll();
  }catch(err){
    showToast('Send failed — check connection', true);
  }finally{
    btn.disabled = false;
    btn.textContent = 'Send';
  }
});

function resetAll(){
  deviceId = '';
  deviceType = '';
  scanType = 'manual';
  photoDataUrl = '';
  document.getElementById('deviceIdInput').value = '';
  selectDeviceTypePill('');
  showScreen('start');
}
</script>
</body>
</html>
