<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DanteSnap!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
  :root{
    --bg:#0e1117; --card:#171b24; --accent:#3ddc97; --accent2:#2bb6e8;
    --text:#eef1f6; --muted:#8a93a6; --danger:#ff6b6b; --warn:#ffcc66;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .app{width:100%; max-width:480px;}
  h1{
    text-align:center; font-size:28px; margin:0 0 4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{text-align:center; color:var(--muted); font-size:13px; margin-bottom:20px;}
  .card{
    background:var(--card); border-radius:18px; padding:20px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);
  }
  .screen{display:none;}
  .screen.active{display:block;}

  .pillrow{display:flex; gap:8px; justify-content:center; margin-bottom:18px;}
  .pill{
    flex:1; padding:10px 0; border-radius:999px; border:2px solid #2a2f3d;
    background:transparent; color:var(--muted); font-weight:600; font-size:14px;
  }
  .pill.active{border-color:var(--accent); color:var(--accent); background:rgba(61,220,151,.08);}

  button{font-family:inherit; cursor:pointer;}
  .btn{
    display:block; width:100%; padding:14px; border:none; border-radius:14px;
    font-size:16px; font-weight:700; margin-top:10px; transition:transform .1s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#06140f;}
  .btn-secondary{background:#232838; color:var(--text);}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  .btn[disabled]{opacity:.5;}

  .video-wrap{
    position:relative; border-radius:14px; overflow:hidden; background:#000;
    aspect-ratio:3/4;
  }
  video{width:100%; height:100%; object-fit:cover; display:block;}
  .guide-box{
    position:absolute; border:3px solid var(--accent); border-radius:10px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.35);
  }
  .guide-qr{top:30%; left:20%; width:60%; height:40%;}
  .guide-ocr{top:38%; left:8%; width:84%; height:24%;}
  .status-text{
    position:absolute; bottom:10px; left:0; right:0; text-align:center;
    color:#fff; font-size:13px; font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,.8);
  }

  label{display:block; font-size:13px; color:var(--muted); margin:14px 0 6px;}
  input[type=text]{
    width:100%; padding:14px; border-radius:12px; border:1px solid #2a2f3d;
    background:#0e1117; color:var(--text); font-size:16px;
  }

  .photo-preview{width:100%; border-radius:14px; display:block;}
  .row{display:flex; gap:10px;}
  .row .btn{flex:1;}

  #toast{
    position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-20px);
    background:var(--accent); color:#06140f; padding:12px 20px; border-radius:12px;
    font-weight:700; opacity:0; transition:all .3s; z-index:50; display:flex; align-items:center; gap:8px;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .check{
    width:18px; height:18px; border-radius:50%; background:#06140f; position:relative; flex-shrink:0;
  }
  .check::after{
    content:''; position:absolute; left:5px; top:3px; width:5px; height:9px;
    border:2px solid var(--accent); border-top:none; border-left:none; transform:rotate(45deg);
  }
</style>
</head>
<body>

<div id="toast"><span class="check"></span><span id="toastText">Sent!</span></div>

<div class="app">
  <h1>DanteSnap!</h1>
  <div class="subtitle">Dante device scanner — Audinate / Neutrik / Glensound</div>

  <div class="card">

    <!-- SCREEN 1: start -->
    <div class="screen active" id="screen-start">
      <div class="pillrow">
        <button class="pill mode-pill active" data-mode="auto">Auto</button>
        <button class="pill mode-pill" data-mode="qr">QR only</button>
        <button class="pill mode-pill" data-mode="ocr">Text only</button>
      </div>
      <button class="btn btn-primary" id="btnStartCamera">Start Camera</button>
    </div>

    <!-- SCREEN 2: scanning -->
    <div class="screen" id="screen-scan">
      <div class="video-wrap">
        <video id="video" playsinline muted autoplay></video>
        <div class="guide-box" id="guideBox"></div>
        <div class="status-text" id="statusText">Looking for QR code…</div>
      </div>
      <div class="row">
        <button class="btn btn-secondary" id="btnSwitchMode">Switch to text scan</button>
        <button class="btn btn-secondary" id="btnCaptureText" style="display:none;">Capture text</button>
      </div>
      <button class="btn btn-danger" id="btnCancelScan">Cancel</button>
    </div>

    <!-- SCREEN 3: confirm device id -->
    <div class="screen" id="screen-id">
      <label>Device ID (edit if needed)</label>
      <input type="text" id="deviceIdInput" placeholder="Scanned ID will appear here">

      <label>Device Type</label>
      <div class="pillrow" id="deviceTypeAuto" style="display:none; justify-content:flex-start;">
        <div class="pill active" style="flex:none; padding:10px 16px;" id="deviceTypeAutoLabel">Audinate AVIO (auto)</div>
      </div>
      <div class="pillrow" id="deviceTypeManual" style="display:none;">
        <button class="pill devicetype-pill" data-devicetype="Neutrik">Neutrik</button>
        <button class="pill devicetype-pill" data-devicetype="Glensound">Glensound</button>
      </div>

      <label>Location</label>
      <input type="text" id="locationInput" placeholder="e.g. Commentary Booth 3">

      <button class="btn btn-primary" id="btnToPhoto">Next: take photo</button>
      <button class="btn btn-secondary" id="btnRescan">Rescan</button>
    </div>

    <!-- SCREEN 4: photo -->
    <div class="screen" id="screen-photo">
      <div class="video-wrap" id="photoVideoWrap">
        <video id="videoPhoto" playsinline muted autoplay></video>
      </div>
      <img id="photoPreview" class="photo-preview" style="display:none;">
      <div class="row" id="photoButtons">
        <button class="btn btn-primary" id="btnTakePhoto">Take Photo</button>
      </div>
      <div class="row" id="photoConfirmButtons" style="display:none;">
        <button class="btn btn-secondary" id="btnRetakePhoto">Retake</button>
        <button class="btn btn-primary" id="btnConfirmPhoto">Use Photo</button>
      </div>
    </div>

    <!-- SCREEN 5: send -->
    <div class="screen" id="screen-send">
      <label>Location</label>
      <input type="text" id="finalLocation" readonly>
      <label>Device Type</label>
      <input type="text" id="finalDeviceType" readonly>
      <label>Device ID</label>
      <input type="text" id="finalDeviceId" readonly>
      <img id="finalPhotoPreview" class="photo-preview" style="margin-top:12px;">
      <button class="btn btn-primary" id="btnSend">Send</button>
      <button class="btn btn-secondary" id="btnStartOver">Start Over</button>
    </div>

  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
// ===== CONFIG =====
const APPS_SCRIPT_URL = 'PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE'; // .../exec
const AUTO_QR_TIMEOUT_MS = 4000; // in Auto mode, how long to try QR before offering text fallback

// ===== STATE =====
let mode = 'auto'; // auto | qr | ocr
let stream = null;
let scanningQR = false;
let qrTimeoutHandle = null;
let deviceId = '';
let deviceType = '';
let deviceLocation = '';
let scanType = 'manual';
let photoDataUrl = '';

// ===== ELEMENTS =====
const screens = {
  start: document.getElementById('screen-start'),
  scan: document.getElementById('screen-scan'),
  id: document.getElementById('screen-id'),
  photo: document.getElementById('screen-photo'),
  send: document.getElementById('screen-send'),
};
const video = document.getElementById('video');
const videoPhoto = document.getElementById('videoPhoto');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('statusText');
const guideBox = document.getElementById('guideBox');
const btnSwitchMode = document.getElementById('btnSwitchMode');
const btnCaptureText = document.getElementById('btnCaptureText');

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

function showToast(text, isError){
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = text;
  toast.style.background = isError ? 'var(--danger)' : 'var(--accent)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== MODE PILLS =====
document.querySelectorAll('.mode-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    mode = pill.dataset.mode;
  });
});

// ===== CAMERA =====
async function startCamera(targetVideoEl){
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
  });
  targetVideoEl.srcObject = stream;
  await targetVideoEl.play();
}

function stopCamera(){
  if (stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

document.getElementById('btnStartCamera').addEventListener('click', async () => {
  try{
    await startCamera(video);
    showScreen('scan');
    beginScanning();
  }catch(err){
    showToast('Camera error: ' + err.message, true);
  }
});

document.getElementById('btnCancelScan').addEventListener('click', () => {
  scanningQR = false;
  clearTimeout(qrTimeoutHandle);
  stopCamera();
  showScreen('start');
});

// ===== SCAN MODE SWITCHING (inside scan screen) =====
function beginScanning(){
  if (mode === 'ocr'){
    enterOCRUI();
  } else {
    enterQRUI();
    if (mode === 'auto'){
      qrTimeoutHandle = setTimeout(() => {
        if (scanningQR){
          enterOCRUI();
        }
      }, AUTO_QR_TIMEOUT_MS);
    }
  }
}

function enterQRUI(){
  guideBox.className = 'guide-box guide-qr';
  statusText.textContent = 'Looking for QR code…';
  btnSwitchMode.textContent = 'Switch to text scan';
  btnSwitchMode.style.display = 'block';
  btnCaptureText.style.display = 'none';
  scanningQR = true;
  requestAnimationFrame(tickQR);
}

function enterOCRUI(){
  clearTimeout(qrTimeoutHandle);
  scanningQR = false;
  guideBox.className = 'guide-box guide-ocr';
  statusText.textContent = 'Align label text in box, then tap Capture';
  btnSwitchMode.textContent = 'Switch to QR scan';
  btnSwitchMode.style.display = (mode === 'auto') ? 'block' : 'none';
  btnCaptureText.style.display = 'block';
}

btnSwitchMode.addEventListener('click', () => {
  if (guideBox.classList.contains('guide-qr')){
    enterOCRUI();
  } else {
    enterQRUI();
  }
});

btnCaptureText.addEventListener('click', runOCR);

// ===== QR SCAN LOOP =====
function tickQR(){
  if (!scanningQR) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code && code.data){
      scanningQR = false;
      clearTimeout(qrTimeoutHandle);
      onIdDetected(code.data, 'qr');
      return;
    }
  }
  requestAnimationFrame(tickQR);
}

// ===== OCR CAPTURE =====
// NOTE: crop box below is a starting guess (centered band, 84% width / 24% height,
// vertical start ~38%). Tune these % values once we see real Neutrik/Glensound
// label photos, same way the Exterity crop was tuned for MacSnap.
async function runOCR(){
  statusText.textContent = 'Reading text…';
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const cropX = canvas.width * 0.08;
  const cropY = canvas.height * 0.38;
  const cropW = canvas.width * 0.84;
  const cropH = canvas.height * 0.24;

  const cropCanvas = document.createElement('canvas');
  const scale = 2; // 2x upscale
  cropCanvas.width = cropW * scale;
  cropCanvas.height = cropH * scale;
  const cropCtx = cropCanvas.getContext('2d');
  cropCtx.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropCanvas.width, cropCanvas.height);

  // grayscale + simple contrast stretch
  const imgData = cropCtx.getImageData(0, 0, cropCanvas.width, cropCanvas.height);
  const d = imgData.data;
  let min = 255, max = 0;
  for (let i = 0; i < d.length; i += 4){
    const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = gray;
    if (gray < min) min = gray;
    if (gray > max) max = gray;
  }
  const range = Math.max(max - min, 1);
  for (let i = 0; i < d.length; i += 4){
    const stretched = ((d[i] - min) / range) * 255;
    d[i] = d[i+1] = d[i+2] = stretched;
  }
  cropCtx.putImageData(imgData, 0, 0);

  try{
    const result = await Tesseract.recognize(cropCanvas.toDataURL('image/png'), 'eng');
    const text = result.data.text.replace(/\s+/g, ' ').trim();
    scanningQR = false;
    if (text){
      onIdDetected(text, 'ocr');
    } else {
      statusText.textContent = 'No text found — try again or adjust position';
    }
  }catch(err){
    statusText.textContent = 'OCR error — try again';
  }
}

// ===== ID DETECTED → confirm screen =====
function onIdDetected(text, type){
  stopCamera();
  deviceId = text;
  scanType = type;
  document.getElementById('deviceIdInput').value = deviceId;

  const autoBox = document.getElementById('deviceTypeAuto');
  const manualBox = document.getElementById('deviceTypeManual');
  if (type === 'qr'){
    deviceType = 'Audinate AVIO';
    autoBox.style.display = 'flex';
    manualBox.style.display = 'none';
  } else {
    deviceType = '';
    autoBox.style.display = 'none';
    manualBox.style.display = 'flex';
    document.querySelectorAll('.devicetype-pill').forEach(p => p.classList.remove('active'));
  }

  const locationInput = document.getElementById('locationInput');
  if (!locationInput.value){
    locationInput.value = localStorage.getItem('dantesnap_last_location') || '';
  }

  showScreen('id');
}

// device type pill selection (Neutrik / Glensound — only shown for OCR/manual scans)
document.querySelectorAll('.devicetype-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.devicetype-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    deviceType = pill.dataset.devicetype;
  });
});

document.getElementById('btnRescan').addEventListener('click', async () => {
  try{
    await startCamera(video);
    showScreen('scan');
    beginScanning();
  }catch(err){
    showToast('Camera error: ' + err.message, true);
  }
});

document.getElementById('btnToPhoto').addEventListener('click', async () => {
  deviceId = document.getElementById('deviceIdInput').value.trim();
  if (!deviceId){
    showToast('Enter a device ID first', true);
    return;
  }
  if (!deviceType){
    showToast('Select a device type', true);
    return;
  }
  deviceLocation = document.getElementById('locationInput').value.trim();
  if (!deviceLocation){
    showToast('Enter a location', true);
    return;
  }
  localStorage.setItem('dantesnap_last_location', deviceLocation);

  showScreen('photo');
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoVideoWrap').style.display = 'block';
  document.getElementById('photoButtons').style.display = 'flex';
  document.getElementById('photoConfirmButtons').style.display = 'none';
  try{
    await startCamera(videoPhoto);
  }catch(err){
    showToast('Camera error: ' + err.message, true);
  }
});

// ===== PHOTO CAPTURE =====
document.getElementById('btnTakePhoto').addEventListener('click', () => {
  canvas.width = videoPhoto.videoWidth;
  canvas.height = videoPhoto.videoHeight;
  ctx.drawImage(videoPhoto, 0, 0, canvas.width, canvas.height);
  photoDataUrl = canvas.toDataURL('image/jpeg', 0.85);

  stopCamera();
  document.getElementById('photoVideoWrap').style.display = 'none';
  const preview = document.getElementById('photoPreview');
  preview.src = photoDataUrl;
  preview.style.display = 'block';
  document.getElementById('photoButtons').style.display = 'none';
  document.getElementById('photoConfirmButtons').style.display = 'flex';
});

document.getElementById('btnRetakePhoto').addEventListener('click', async () => {
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoVideoWrap').style.display = 'block';
  document.getElementById('photoButtons').style.display = 'flex';
  document.getElementById('photoConfirmButtons').style.display = 'none';
  try{
    await startCamera(videoPhoto);
  }catch(err){
    showToast('Camera error: ' + err.message, true);
  }
});

document.getElementById('btnConfirmPhoto').addEventListener('click', () => {
  document.getElementById('finalLocation').value = deviceLocation;
  document.getElementById('finalDeviceType').value = deviceType;
  document.getElementById('finalDeviceId').value = deviceId;
  document.getElementById('finalPhotoPreview').src = photoDataUrl;
  showScreen('send');
});

// ===== SEND =====
document.getElementById('btnSend').addEventListener('click', async () => {
  const btn = document.getElementById('btnSend');
  if (APPS_SCRIPT_URL.includes('PASTE_YOUR')){
    showToast('Set APPS_SCRIPT_URL in the file first', true);
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const base64 = photoDataUrl.split(',')[1];

  try{
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Apps Script web apps don't return CORS headers; fire-and-forget
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        location: deviceLocation,
        deviceType: deviceType,
        macAddress: deviceId,
        photo: base64,
        photoMimeType: 'image/jpeg'
      })
    });
    showToast('Sent!');
    resetAll();
  }catch(err){
    showToast('Send failed — check connection', true);
    btn.disabled = false;
    btn.textContent = 'Send';
  }
});

document.getElementById('btnStartOver').addEventListener('click', resetAll);

function resetAll(){
  deviceId = '';
  deviceType = '';
  scanType = 'manual';
  photoDataUrl = '';
  document.getElementById('deviceIdInput').value = '';
  const btn = document.getElementById('btnSend');
  btn.disabled = false;
  btn.textContent = 'Send';
  showScreen('start');
}
</script>
</body>
</html>
